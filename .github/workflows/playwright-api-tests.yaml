name: Playwright API Tests

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGERS
# Runs on push only when relevant files change (avoids wasting CI minutes
# on docs/README edits), or manually via the "Run Workflow" button.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    paths:
      - "src/**" # Covers api, factories, fixtures, tests, types, etc.
      - ".github/workflows/playwright-api-tests.yaml" # Re-run if the workflow itself changes
      - "playwright.config.ts" # Catch global Playwright config changes
      - "package.json" # Catch new dependency additions/installs
      - "package-lock.json" # Catch lockfile changes
  workflow_dispatch: # Enables the manual "Run Workflow" button in GitHub Actions UI

# ─────────────────────────────────────────────────────────────────────────────
# CONCURRENCY CONTROL
# If a new push happens while a run is in progress on the same branch,
# the older run is cancelled to avoid redundant work and history conflicts.
# ─────────────────────────────────────────────────────────────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# GLOBAL ENVIRONMENT VARIABLES
# Centralized config — update versions or paths here without touching each step.
# ─────────────────────────────────────────────────────────────────────────────
env:
  NODE_VERSION: "20"
  ALLURE_RESULTS_DIR: allure-results # Raw JSON output from Playwright/Allure
  ALLURE_HISTORY_DIR: allure-history # Final built report for deployment
  KEEP_HISTORIES: 20 # Number of past runs shown in Allure trend chart

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1: test
  # Purpose:  Check out the repo, install dependencies, execute Playwright
  #           tests, and upload the raw results as artifacts for Job 2.
  # Note:     Permissions are intentionally omitted here — this job only
  #           reads code and uploads artifacts; it doesn't need write access.
  # ───────────────────────────────────────────────────────────────────────────

  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest # Uses a standard Linux machine
    timeout-minutes: 30 # Safety net - kills the job if it hangs (e.g. frozen browser install)

    steps:
      # Checks out your repository code onto the runner VM
      - name: Checkout Repository
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # latest commit SHA dated May 5, 2026

      # Installs the specified Node.js version with npm caching enabled
      # to speed up dependency installation on subsequent runs
      - name: Setup Node.js
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # latest commit SHA dated April 23, 2026
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm" # Speeds up future runs by caching packages

      # Performs a clean install based on package-lock.json
      # (faster and more deterministic than `npm install`)
      - name: Install dependencies
        run: npm ci

      # Restores cached Playwright browser binaries if the lockfile hasn't changed.
      # Cache key is OS + package-lock.json hash — invalidates when deps change.
      # Saves ~1-2 minutes on subsequent runs
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # Installs required OS-level system dependencies for all browsers
      # Separated from browser binaries so it run fast (~15-30s) on every run
      # without triggering a full apt-get update (which caused the hang)
      - name: Install Playwright OS dependencies
        run: npx playwright install-deps

      # Only downloads browser binaries if cache miss — skips entirely on cache hit
      # No --with-deps flag here - OS deps are handled by the step above
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install

      # Pings the staging server before tests starts so Render wakes up
      # Retries up to 10 times with 10s delay - handles cold start (~30-60s)
      - name: Warm up staging server
        run: |
          echo "Pinging staging server to wake it up..."
          for i in {1..10}; do 
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.RENDER_STAGING_URL }}/health || echo "000")
            echo "Attempt $i - HTTP STATUS"
            if [ "$STATUS" == "200" ] || [ "$STATUS" == "404" ]; then
              echo "✅ Server is awake"
              break
            fi
            echo "⏳ Server not ready yet, waiting 10s..."
            sleep 10
          done
        env:
          RENDER_STAGING_URL: ${{ secrets.RENDER_STAGING_URL }}

      # Executes the full Playwright test suite.
      # RENDER_STAGING_URL is injected from GitHub Secrets so it's never
      # hardcoded in the codebase.
      - name: Run Playwright tests
        env:
          # This maps your GitHub Secret to the variable Playwright uses
          RENDER_STAGING_URL: ${{ secrets.RENDER_STAGING_URL }}
        run: npx playwright test

      # Uploads the raw Allure JSON results so the publish-report job can
      # consume them. Short retention since they're only needed temporarily.
      - name: Upload Allure results
        if: always() # Run even if tests fail so we always get a report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: allure-results
          path: ${{ env.ALLURE_RESULTS_DIR }}/
          retention-days: 1 # Short-lived - consumed by publish-report job only

      # Uploads the human-readable Playwright HTML report as a separate artifact.
      # Useful for quick inspection directly in the GitHub Actions UI.
      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30 # Keep for 30 days for historical reference

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2: publish-report
  # Purpose:  Download raw results from Job 1, stitch in previous run history
  #           for Allure trend tracking, generate the full Allure report,
  #           and deploy it to GitHub Pages.
  # Depends:  Runs after `test` job completes — even if tests failed.
  # Permissions: Needs write access to push the report to the gh-pages branch.
  # ───────────────────────────────────────────────────────────────────────────

  publish-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: test # Waits for Job 1 to complete before starting
    if: always() # Runs regardless of whether tests passed or failed
    timeout-minutes: 10 # Report generation and deploy should never exceed 10 mins
    permissions:
      contents: write # Required to push to the gh-pages branch
      pages: write # Required for GitHub Pages deployment
      id-token: write # Required for OIDC-based auth with GitHub Pages

    steps:
      # Surfaces whether the test job passed or failed in the
      # publish job's logs - useful when debugging a report without switching jobs.
      - name: Check test job result
        run: |
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "✅ Test job passed — publishing report"
          elif [ "${{ needs.test.result }}" == "failure" ]; then
            echo "❌ Test job failed — publishing report to capture failures"
          elif [ "${{ needs.test.result }}" == "cancelled" ]; then
            echo "⚠️  Test job was cancelled — report may be incomplete"
          else
            echo "ℹ️  Test job result: ${{ needs.test.result }}"
          fi

      # Downloads the raw allure-results artifact uploaded by the test job.
      # This is the bridge between Job 1 and Job 2.
      - name: Download Allure results from test job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          name: allure-results
          path: ${{ env.ALLURE_RESULTS_DIR }}

      # Checks out the gh-pages branch which contains all previous run folders
      # and the last-history directory used for trend data.
      # continue-on-error: true - handles the case where gh-pages doesn't exist yet (first run).
      - name: Checkout gh-pages history
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # latest commit SHA dated May 5, 2026
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # Copies the last run's history data into allure-results/history so the
      # Allure report generator can build accurate trend charts.
      # Without this step, the trend chart would always be 1 run behind.
      # continue-on-error: true - safely handles missing history on first runs.
      - name: Copy history from last run into allure-results
        continue-on-error: true
        run: |
          if [ -d "gh-pages/last-history" ]; then
            echo "Found last-history - copying into allure-results/history"
            mkdir -p ${{ env.ALLURE_RESULTS_DIR }}/history
            cp -r gh-pages/last-history/. ${{ env.ALLURE_RESULTS_DIR }}/history/
          else
            echo "No last-history found (likely first run), skipping."
          fi

      # Generates the full Allure HTML report by combining:
      #   - allure-results/       → current run's test data
      #   - gh-pages/             → numbered history folders (e.g. 39/, 40/, 41/)
      #   - allure-results/history → trend/history metadata from the previous run
      # Outputs the final deployable report into allure-history/.
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@53ebb757a2097edc77c53ecef4d454fc2f2f774c # v1.13
        with:
          allure_results: ${{ env.ALLURE_RESULTS_DIR }}
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: ${{ env.ALLURE_HISTORY_DIR }}
          keep_histories: ${{ env.KEEP_HISTORIES }} # Max runs shown in trend chart

      # Deploys the generated allure-history/ folder to the gh-pages branch.
      # No force_orphan — this preserves the cumulative numbered run folders
      # (e.g. 39/, 40/, 41/) which are required for the trend chart to work.
      - name: Deploy Allure Report to Github Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          publish_dir: ${{ env.ALLURE_HISTORY_DIR }}
          publish_branch: gh-pages
